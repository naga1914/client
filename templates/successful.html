<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'images/logo.jpeg' %}">
    <meta charset="UTF-8">
    <title>Registration Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">

        <div class="text-5xl mb-4">🎉</div>

        <h2 class="text-2xl font-bold text-gray-800 mb-3">
            Registration Successful
        </h2>

        <p class="text-gray-600 mb-6">
            Your account has been created successfully. You can now log in and start using the platform.
        </p>

        <a href="{% url 'login' %}"
           class="inline-block w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
            Login Here
        </a>

    </div>

</body>
</html>
